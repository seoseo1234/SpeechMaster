<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>저학년 모드 - AI 스피치버디</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .story-box {
      font-size: 32px;
      line-height: 1.8;
      text-align: center;
      padding: 60px 40px;
      margin-bottom: 40px;
      word-break: keep-all;
    }
    .mic-btn-container {
      text-align: center;
      margin-bottom: 40px;
    }
    .feedback-box {
      display: flex;
      gap: 20px;
      align-items: center;
      background: var(--color-canvas);
      padding: 24px;
      border-radius: 20px;
      border: 2px dashed var(--color-pastel-green-dark);
    }
    .character {
      font-size: 48px;
    }
  </style>
</head>
<body class="theme-low-grade">

  <header>
    <div class="container flex justify-between items-center" style="color: #333">
      <div class="nav-brand" style="font-size: 20px;">
        <a href="index.html">🏠 홈으로</a>
      </div>
      <div style="font-weight: 700; font-size: 24px;">👶 AI 스피치버디</div>
      <div class="pill" style="background: white;">⚙️ 마이크 설정</div>
    </div>
  </header>

  <main class="container" style="padding-top: 40px; padding-bottom: 60px;">
    
    <div style="text-align: center; color: var(--color-muted); font-weight: 600; margin-bottom: 16px;">
      [ 오늘의 읽기 도전! ]
    </div>

    <div class="card story-box" id="story-box">
      "아기 다람쥐가 나무 위로 쪼르르<br>
      올라갔습니다."
    </div>

    <div class="mic-btn-container">
      <button class="btn-action" id="mic-btn">🎤 누르고 말하기</button>
    </div>

      <!-- Feedback Box -->
      <h2 id="feedback-title" style="display: none; margin-top: 32px; font-size: 20px; color: var(--color-primary-dark);">요정의 피드백</h2>
      <div id="feedback-box" class="feedback-box">
        <div class="feedback-character" style="display: flex; align-items: center; justify-content: center; background: #fff8cc; border-radius: 50%;">
          <span style="font-size: 48px;">⭐</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <p id="feedback-text" class="feedback-text" style="margin: 0; font-size: 18px; font-weight: 500;"></p>
          <p id="feedback-detail" style="margin: 0; font-size: 15px; color: var(--color-muted);"></p>
        </div>
      </div>

      <!-- Recommendation Box -->
      <div id="recommendation-box" style="display: none; margin-top: 16px; padding: 16px; background-color: var(--color-navy-surface); border-radius: var(--radius-md); border: 2px dashed var(--color-promo-blue);">
        <h3 style="margin-top: 0; color: var(--color-promo-blue); font-size: 16px;">💡 별 요정의 추천 발음 연습 단어!</h3>
        <p id="recommendation-text" style="margin-bottom: 12px; font-size: 16px; font-weight: bold; color: var(--color-text);"></p>
        <button id="practice-btn" style="display: none; width: 100%; padding: 10px; background: var(--color-promo-blue); color: white; font-weight: bold; font-size: 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; box-shadow: 0 4px 0 #015a91;">이 단어들로 연습하기 🎯</button>
      </div>

    </main>
  </div>

  <script type="module" src="./low-grade.js"></script>
</body>
</html>
